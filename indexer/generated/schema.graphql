"""
The `JSON` scalar type represents JSON values as specified by [ECMA-404](http://www.ecma-international.org/publications/files/ECMA-ST/ECMA-404.pdf).
"""
scalar JSON

scalar BigInt

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

type ViewPageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
}

type Meta {
  status: JSON
}

type Query {
  depositEvent(id: String!): depositEvent
  depositEvents(where: depositEventFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int, offset: Int): depositEventPage!
  withdrawalEvent(id: String!): withdrawalEvent
  withdrawalEvents(where: withdrawalEventFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int, offset: Int): withdrawalEventPage!
  _meta: Meta
}

type depositEvent {
  id: String!
  commitment: String!
  leafIndex: Int!
  transactionHash: String!
  timestamp: BigInt!
  blockNumber: BigInt!
}

type depositEventPage {
  items: [depositEvent!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

input depositEventFilter {
  AND: [depositEventFilter]
  OR: [depositEventFilter]
  id: String
  id_not: String
  id_in: [String]
  id_not_in: [String]
  id_contains: String
  id_not_contains: String
  id_starts_with: String
  id_ends_with: String
  id_not_starts_with: String
  id_not_ends_with: String
  commitment: String
  commitment_not: String
  commitment_in: [String]
  commitment_not_in: [String]
  commitment_contains: String
  commitment_not_contains: String
  commitment_starts_with: String
  commitment_ends_with: String
  commitment_not_starts_with: String
  commitment_not_ends_with: String
  leafIndex: Int
  leafIndex_not: Int
  leafIndex_in: [Int]
  leafIndex_not_in: [Int]
  leafIndex_gt: Int
  leafIndex_lt: Int
  leafIndex_gte: Int
  leafIndex_lte: Int
  transactionHash: String
  transactionHash_not: String
  transactionHash_in: [String]
  transactionHash_not_in: [String]
  transactionHash_contains: String
  transactionHash_not_contains: String
  transactionHash_starts_with: String
  transactionHash_ends_with: String
  transactionHash_not_starts_with: String
  transactionHash_not_ends_with: String
  timestamp: BigInt
  timestamp_not: BigInt
  timestamp_in: [BigInt]
  timestamp_not_in: [BigInt]
  timestamp_gt: BigInt
  timestamp_lt: BigInt
  timestamp_gte: BigInt
  timestamp_lte: BigInt
  blockNumber: BigInt
  blockNumber_not: BigInt
  blockNumber_in: [BigInt]
  blockNumber_not_in: [BigInt]
  blockNumber_gt: BigInt
  blockNumber_lt: BigInt
  blockNumber_gte: BigInt
  blockNumber_lte: BigInt
}

type withdrawalEvent {
  id: String!
  recipient: String!
  nullifierHash: String!
  transactionHash: String!
  timestamp: BigInt!
  blockNumber: BigInt!
}

type withdrawalEventPage {
  items: [withdrawalEvent!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

input withdrawalEventFilter {
  AND: [withdrawalEventFilter]
  OR: [withdrawalEventFilter]
  id: String
  id_not: String
  id_in: [String]
  id_not_in: [String]
  id_contains: String
  id_not_contains: String
  id_starts_with: String
  id_ends_with: String
  id_not_starts_with: String
  id_not_ends_with: String
  recipient: String
  recipient_not: String
  recipient_in: [String]
  recipient_not_in: [String]
  recipient_contains: String
  recipient_not_contains: String
  recipient_starts_with: String
  recipient_ends_with: String
  recipient_not_starts_with: String
  recipient_not_ends_with: String
  nullifierHash: String
  nullifierHash_not: String
  nullifierHash_in: [String]
  nullifierHash_not_in: [String]
  nullifierHash_contains: String
  nullifierHash_not_contains: String
  nullifierHash_starts_with: String
  nullifierHash_ends_with: String
  nullifierHash_not_starts_with: String
  nullifierHash_not_ends_with: String
  transactionHash: String
  transactionHash_not: String
  transactionHash_in: [String]
  transactionHash_not_in: [String]
  transactionHash_contains: String
  transactionHash_not_contains: String
  transactionHash_starts_with: String
  transactionHash_ends_with: String
  transactionHash_not_starts_with: String
  transactionHash_not_ends_with: String
  timestamp: BigInt
  timestamp_not: BigInt
  timestamp_in: [BigInt]
  timestamp_not_in: [BigInt]
  timestamp_gt: BigInt
  timestamp_lt: BigInt
  timestamp_gte: BigInt
  timestamp_lte: BigInt
  blockNumber: BigInt
  blockNumber_not: BigInt
  blockNumber_in: [BigInt]
  blockNumber_not_in: [BigInt]
  blockNumber_gt: BigInt
  blockNumber_lt: BigInt
  blockNumber_gte: BigInt
  blockNumber_lte: BigInt
}